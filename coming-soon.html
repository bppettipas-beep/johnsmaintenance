<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon – John's Maintenance</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9faf7;
      font-family: 'Segoe UI', Georgia, sans-serif;
    }

    .container {
      text-align: center;
      padding: 3rem 2rem;
      max-width: 560px;
    }

    .leaf-icon {
      width: 52px;
      height: 52px;
      margin: 0 auto 1.5rem;
    }

    .logo {
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #4a7c59;
      margin-bottom: 2rem;
      font-weight: 600;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: #4a7c59;
      margin: 0 auto 2rem;
      border-radius: 2px;
    }

    h1 {
      font-size: clamp(2.8rem, 9vw, 5.5rem);
      font-weight: 700;
      color: #1a2e22;
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin-bottom: 1.25rem;
    }

    h1 span {
      color: #4a7c59;
    }

    .subtitle {
      font-size: 1.05rem;
      color: #5c6b62;
      max-width: 400px;
      margin: 0 auto 2.5rem;
      line-height: 1.7;
    }


    .footer-note {
      font-size: 0.8rem;
      color: #9aab9f;
      margin-top: 2.5rem;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Simple leaf SVG icon -->
    <svg class="leaf-icon" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M26 6C26 6 10 14 10 28C10 36.837 17.163 44 26 44C34.837 44 42 36.837 42 28C42 14 26 6 26 6Z" fill="#4a7c59" opacity="0.15"/>
      <path d="M26 6C26 6 10 14 10 28C10 36.837 17.163 44 26 44C34.837 44 42 36.837 42 28C42 14 26 6 26 6Z" stroke="#4a7c59" stroke-width="2" stroke-linejoin="round"/>
      <line x1="26" y1="44" x2="26" y2="22" stroke="#4a7c59" stroke-width="2" stroke-linecap="round"/>
      <path d="M26 32C26 32 20 28 16 24" stroke="#4a7c59" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M26 28C26 28 32 24 36 20" stroke="#4a7c59" stroke-width="1.5" stroke-linecap="round"/>
    </svg>

    <div class="logo">John's Maintenance</div>
    <div class="divider"></div>

    <h1>Coming <span>Soon</span></h1>
    <p class="subtitle">Our new website is on its way. We look forward to serving you soon.</p>

    <p class="footer-note">Professional landscaping &amp; grounds maintenance</p>
  </div>

</body>
</html>
